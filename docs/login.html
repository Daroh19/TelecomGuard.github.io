<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelecomGuard - Iniciar Sesión</title>
    <link rel="stylesheet" href="assets/styles/login-style.css">
</head>
<body>

<main class="register-container">
    <header class="logo-container">
        <div class="brand-logo">
            <img src="assets/images/logo.png" alt="TelecomGuard Logo">
        </div>

        <div >
            <img src="assets/images/user.png" alt="Avatar del usuario" class="user">
        </div>

        <h1 class="register-title" style="margin-top: 10px; margin-bottom: 20px;">Iniciar Sesion</h1>
    </header>

    <form class="login-form">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn-login">Iniciar Sesion</button>
    </form>

    <footer class="login-footer">
        <span>¿No tienes una cuenta?</span>
        <a href="register.html" class="register-link">Regístrate</a>
    </footer>
</main>

</body>
</html>
