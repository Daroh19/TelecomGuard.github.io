<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - TelecomGuard</title>

    <link rel="stylesheet" href="assets/styles/register.css">
</head>
<body>

<div class="register-container">

    <!-- Logo -->
    <div class="logo-container">
        <img src="assets/images/logo.png" alt="TelecomGuard Logo">
    </div>

    <h2 class="register-title">Registrarse</h2>

    <form class="register-form">

        <div class="form-group">
            <label for="nombres">Nombres</label>
            <input type="text" id="nombres" class="form-control" name="nombres" required>
        </div>

        <div class="form-group">
            <label for="apellidos">Apellidos</label>
            <input type="text" id="apellidos" class="form-control" name="apellidos" required>
        </div>

        <div class="form-group">
            <label for="tipo_usuario">Tipo de Usuario</label>
            <select id="tipo_usuario" class="form-control" name="tipo_usuario" required>
                <option value="" disabled selected></option>
                <option value="ingeniero">Ingeniero</option>
                <option value="gerente">Gerente</option>
            </select>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-control" name="email" required>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" class="form-control" name="password" required>
        </div>

        <div class="form-group">
            <label for="confirmar_password">Confirmar Contraseña</label>
            <input type="password" id="confirmar_password" class="form-control" name="confirmar_password" required>
        </div>

        <button type="submit" class="btn-register">Registrarse</button>
    </form>
</div>

</body>
</html>
